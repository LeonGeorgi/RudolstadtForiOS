appId: de.leongeorgi.RudolstadtForiOS
name: App Store - Complete screenshot set
tags:
  - app-store
---
- launchApp:
    arguments:
      "-screenshotMode": "YES"
      "-screenshotAppearance": "light"
      "-AppleLanguages": ${APPLE_LANGUAGES}
      "-AppleLocale": ${APPLE_LOCALE}
- setOrientation: PORTRAIT
- extendedWaitUntil:
    visible:
      id: "schedule-screen"
    timeout: 20000

# Schedule
- tapOn:
    text: "Sun|So\\."
- swipe:
    direction: UP
    duration: 700
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: 01-schedule

# Scrolling the timeline minimizes the iPhone tab bar. Tapping its remaining
# selected tab expands it before navigating to another tab.
- tapOn:
    id: "calendar"
- extendedWaitUntil:
    visible:
      id: "theatermasks\\.fill"
    timeout: 10000

# Artists
- tapOn:
    id: "theatermasks\\.fill"
- extendedWaitUntil:
    visible:
      id: "artist-194"
    timeout: 20000
- extendedWaitUntil:
    visible:
      id: "artist-image-loaded-194"
    timeout: 30000
- waitForAnimationToEnd:
    timeout: 8000
- takeScreenshot: 02-artists

# Locations
- tapOn:
    id: "map\\.fill"
- extendedWaitUntil:
    visible:
      id: "festival-map"
    timeout: 20000
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: 03-locations

# Artist detail
- tapOn:
    id: "theatermasks\\.fill"
- tapOn:
    text: "Search|Suchen"
- inputText: "Duo Ruut"
- extendedWaitUntil:
    visible:
      id: "artist-176"
    timeout: 15000
- tapOn:
    id: "artist-176"
- extendedWaitUntil:
    visible:
      id: "artist-detail-176-theme-ready"
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: "artist-image-loaded-176"
    timeout: 30000
- waitForAnimationToEnd:
    timeout: 8000
- takeScreenshot: 04-artist-detail

# Reset the selected artists tab before switching away so it is still at its root later.
- tapOn:
    id: "theatermasks\\.fill"
- extendedWaitUntil:
    visible:
      text: "Clear text|Text löschen"
    timeout: 10000
- tapOn:
    text: "Clear text|Text löschen"
- extendedWaitUntil:
    visible:
      id: "artist-194"
    timeout: 20000

# Friend recommendations
- tapOn:
    id: "person.2\\.fill"
- runFlow:
    when:
      visible:
        id: "artist-194"
    commands:
      - tapOn:
          id: "person.2\\.fill"
- scrollUntilVisible:
    element:
      text: "Friend recommendations|Freundesempfehlungen"
    direction: DOWN
    timeout: 15000
    speed: 50
    visibilityPercentage: 60
    centerElement: true
- tapOn:
    text: "Show more|Mehr anzeigen"
- extendedWaitUntil:
    visible:
      text: "Friend recommendations|Freundesempfehlungen"
    timeout: 15000
- extendedWaitUntil:
    visible:
      id: "artist-image-loaded-175"
    timeout: 30000
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: 05-friends

# Artist world map
- tapOn:
    id: "theatermasks\\.fill"
- tapOn:
    text: "Explore on the world map|Auf der Weltkarte entdecken"
- extendedWaitUntil:
    visible:
      id: "artist-world-map"
    timeout: 20000
- extendedWaitUntil:
    notVisible:
      text: "Loading world map…|Weltkarte wird geladen…"
    timeout: 30000
- waitForAnimationToEnd:
    timeout: 8000
- takeScreenshot: 06-artist-world-map

# Dark schedule, still in the same Maestro invocation.
- launchApp:
    arguments:
      "-screenshotMode": "YES"
      "-screenshotAppearance": "dark"
      "-AppleLanguages": ${APPLE_LANGUAGES}
      "-AppleLocale": ${APPLE_LOCALE}
- setOrientation: PORTRAIT
- extendedWaitUntil:
    visible:
      id: "schedule-screen"
    timeout: 20000
- tapOn:
    text: "Sun|So\\."
- swipe:
    direction: UP
    duration: 700
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: 07-schedule-dark
