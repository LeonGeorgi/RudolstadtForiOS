appId: de.leongeorgi.RudolstadtForiOS
name: App Store - Artist world map
tags:
  - app-store
---
- runFlow: suites/relaunch.yaml
- extendedWaitUntil:
    visible:
      id: "schedule-screen"
    timeout: 20000
- tapOn:
    id: "theatermasks\\.fill"
- tapOn:
    text: "Explore on the world map|Auf der Weltkarte entdecken"
- extendedWaitUntil:
    visible:
      id: "artist-world-map"
    timeout: 20000
- extendedWaitUntil:
    notVisible:
      text: "Loading world map…|Weltkarte wird geladen…"
    timeout: 30000
- waitForAnimationToEnd:
    timeout: 8000
- takeScreenshot: 06-artist-world-map
