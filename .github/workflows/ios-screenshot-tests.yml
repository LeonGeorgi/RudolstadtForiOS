name: App Store Screenshots

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  capture-screenshots:
    runs-on: macos-26
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Maestro
        env:
          MAESTRO_VERSION: "2.6.1"
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"
          "$HOME/.maestro/bin/maestro" --version

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Select iOS 26 simulator
        id: simulator
        run: |
          DEVICE_ID="$({
            xcrun simctl list devices available --json | \
              ruby -rjson -e '
                preferred_names = ["iPhone 17 Pro", "iPhone 17", "iPhone 17e"]
                devices = JSON.parse(STDIN.read).fetch("devices")
                candidates = devices.flat_map do |runtime, runtime_devices|
                  next [] unless runtime.include?("iOS-26")
                  runtime_devices.select { |device| device["isAvailable"] && device["name"].start_with?("iPhone") }
                end
                abort("No available iOS 26 iPhone simulator found") if candidates.empty?
                selected = candidates.min_by do |device|
                  preferred_names.index(device.fetch("name")) || preferred_names.length
                end
                puts selected.fetch("udid")
              '
          })"
          echo "device-id=$DEVICE_ID" >> "$GITHUB_OUTPUT"
          xcrun simctl list devices available

      - name: Capture App Store screenshots
        env:
          DEVICE_ID: ${{ steps.simulator.outputs.device-id }}
          DERIVED_DATA_PATH: ${{ runner.temp }}/AppStoreScreenshotDerivedData
          OUTPUT_ROOT: ${{ runner.temp }}/AppStoreScreenshots
          MAESTRO_CLI_NO_ANALYTICS: "1"
        run: |
          set -o pipefail
          scripts/capture-app-store-screenshots.sh 2>&1 | tee "${{ runner.temp }}/app-store-screenshots.log"

      - name: Upload screenshots
        id: upload_screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-store-screenshots-${{ github.run_number }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/AppStoreScreenshots
          if-no-files-found: warn
          retention-days: 14

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: app-store-screenshot-diagnostics-${{ github.run_number }}-${{ github.run_attempt }}
          path: |
            ${{ runner.temp }}/app-store-screenshots.log
            ${{ runner.temp }}/AppStoreScreenshots
          if-no-files-found: warn
          retention-days: 14

      - name: Add workflow summary
        if: always()
        env:
          SCREENSHOT_ARTIFACT_URL: ${{ steps.upload_screenshots.outputs.artifact-url }}
        run: |
          {
            echo "## App Store Screenshots"
            echo
            echo "- Result: ${{ job.status }}"
            echo "- Screenshots: ${SCREENSHOT_ARTIFACT_URL:-not uploaded}"
            echo
            echo "The artifact contains German and English light-mode screenshots grouped by simulator."
          } >> "$GITHUB_STEP_SUMMARY"
