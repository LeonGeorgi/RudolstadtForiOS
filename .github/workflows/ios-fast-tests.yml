name: Fast Tests

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: fast-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  unit-tests:
    runs-on: macos-26
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Select iOS 26 simulator
        id: simulator
        run: |
          DEVICE_ID="$({
            xcrun simctl list devices available --json | \
              ruby -rjson -e '
                preferred_names = ["iPhone 17 Pro", "iPhone 17", "iPhone 17e"]
                devices = JSON.parse(STDIN.read).fetch("devices")
                candidates = devices.flat_map do |runtime, runtime_devices|
                  next [] unless runtime.include?("iOS-26")
                  runtime_devices.select { |device| device["isAvailable"] && device["name"].start_with?("iPhone") }
                end
                abort("No available iOS 26 iPhone simulator found") if candidates.empty?
                selected = candidates.min_by do |device|
                  preferred_names.index(device.fetch("name")) || preferred_names.length
                end
                puts selected.fetch("udid")
              '
          })"
          echo "device-id=$DEVICE_ID" >> "$GITHUB_OUTPUT"

      - name: Run fast tests
        env:
          DEVICE_ID: ${{ steps.simulator.outputs.device-id }}
          DERIVED_DATA_PATH: ${{ runner.temp }}/FastTestsDerivedData
          RESULT_BUNDLE_PATH: ${{ runner.temp }}/FastTests.xcresult
          TEST_LOG_PATH: ${{ runner.temp }}/fast-tests.log
        run: |
          set -o pipefail
          xcodebuild test \
            -quiet \
            -project "RudolstadtForiOS.xcodeproj" \
            -scheme "Unit Tests" \
            -testPlan "Fast Tests" \
            -configuration Debug \
            -destination "platform=iOS Simulator,id=$DEVICE_ID" \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -resultBundlePath "$RESULT_BUNDLE_PATH" \
            -enableCodeCoverage YES \
            2>&1 | tee "$TEST_LOG_PATH"

      - name: Create coverage report
        if: always()
        env:
          RESULT_BUNDLE_PATH: ${{ runner.temp }}/FastTests.xcresult
          COVERAGE_REPORT_PATH: ${{ runner.temp }}/fast-tests-coverage.txt
        run: |
          if [[ -d "$RESULT_BUNDLE_PATH" ]] && \
             xcrun xccov view --report "$RESULT_BUNDLE_PATH" > "$COVERAGE_REPORT_PATH"; then
            {
              echo "## Fast Test Coverage"
              echo
              echo '```text'
              cat "$COVERAGE_REPORT_PATH"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Coverage report unavailable." | tee "$COVERAGE_REPORT_PATH"
          fi

      - name: Upload test results and coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fast-tests-${{ github.run_number }}-${{ github.run_attempt }}
          path: |
            ${{ runner.temp }}/FastTests.xcresult
            ${{ runner.temp }}/fast-tests.log
            ${{ runner.temp }}/fast-tests-coverage.txt
          if-no-files-found: warn
          retention-days: 14
